version: "3.9"

# Kavach — Local Development Services
# Usage:
#   docker-compose up -d        # start all services
#   docker-compose down         # stop all services
#   docker-compose down -v      # stop and remove volumes (wipes DB data)

services:
  postgres:
    image: postgres:16-alpine
    container_name: kavach_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: kavach_dev
      POSTGRES_USER: kavach
      POSTGRES_PASSWORD: kavach
    ports:
      - "5432:5432"
    volumes:
      - kavach_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kavach -d kavach_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kavach_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  kavach_db_data:
    driver: local
